name: Release Switch2 Mode v0.7.0

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-v0.7.0.yml"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      issues: write
      statuses: write

    steps:
      - name: Recuperer le projet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Synchroniser la version du plugin
        run: |
          sed -i 's/WUPS_PLUGIN_VERSION("0.6.0")/WUPS_PLUGIN_VERSION("0.7.0")/' plugin/src/main.cpp
          if ! git diff --quiet -- plugin/src/main.cpp; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add plugin/src/main.cpp
            git commit -m "Passer le plugin Switch2 Mode en v0.7.0"
            git push origin HEAD:main
          fi

      - name: Verifier les ressources de l'intro
        id: resources
        continue-on-error: true
        run: |
          set -o pipefail
          {
            test -f app/content/intro/intro.ogg
            test "$(find app/content/intro/frames -name 'frame_*.webp' | wc -l)" -eq 276
          } 2>&1 | tee resources.log

      - name: Construire l'image de compilation
        id: docker_build
        if: steps.resources.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          docker build -t switch2mode-builder . 2>&1 | tee docker-build.log

      - name: Compiler le WUHB, le plugin et l'archive SD
        id: compile
        if: steps.docker_build.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          docker run --rm \
            -v "$PWD":/project \
            switch2mode-builder \
            ./scripts/build.sh 2>&1 | tee compile.log
          test -f build/app/Switch2Mode.wuhb
          test -f plugin/Switch2ModePlugin.wps
          test -f dist/Switch2Mode_SD.zip

      - name: Publier un rapport si la compilation echoue
        if: steps.resources.outcome != 'success' || steps.docker_build.outcome != 'success' || steps.compile.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Echec de la release v0.7.0"
            echo
            echo "- Commit : \`$GITHUB_SHA\`"
            echo "- Execution : \`$GITHUB_RUN_ID\`"
            echo "- Ressources : \`${{ steps.resources.outcome }}\`"
            echo "- Image Docker : \`${{ steps.docker_build.outcome }}\`"
            echo "- Compilation : \`${{ steps.compile.outcome }}\`"
            echo
            for log in resources.log docker-build.log compile.log; do
              if [[ -f "$log" ]]; then
                echo "### $log"
                echo '```text'
                tail -n 220 "$log"
                echo '```'
              fi
            done
          } > failure-report.md

          gh issue create \
            --title "Diagnostic release v0.7.0 — run $GITHUB_RUN_ID" \
            --body-file failure-report.md
          exit 1

      - name: Creer les notes de version
        if: steps.compile.outcome == 'success'
        run: |
          cat > release-notes.md <<'EOF'
          ## Switch2 Mode v0.7.0 — Collections Wii U

          Cette version corrige la gestion des dossiers : Switch2 Mode lit maintenant les vraies collections creees directement depuis le menu Wii U du profil actif.

          ### Nouveautes et corrections
          - Import des noms des collections du menu Wii U
          - Reprise de leur couleur originale
          - Affichage des jeux ranges dans chaque collection et dans leur ordre
          - Lecture de la sauvegarde native MLC ou de la copie redirigee par Homebrew on Wii U Menu
          - Lecture strictement seule : aucun changement de la NAND ou de l'organisation du menu
          - Les jeux ranges ne sont plus dupliques sur l'accueil
          - `Tous les jeux`, `Favoris` et `Recents` sont maintenant clairement des vues rapides Switch2 Mode
          - Application graphique `.wuhb`, plugin Aroma `.wps` et archive SD prete a copier
          - Intro 16:9 a 30 FPS et animations de l'interface conservees

          ### Installation recommandee
          1. Telecharger `Switch2Mode_SD.zip`.
          2. Extraire le dossier `wiiu` a la racine de la carte SD.
          3. Remplacer les anciens fichiers lorsque cela est demande.
          4. Demarrer la Wii U avec Aroma et lancer `Switch2 Mode`.

          > Version alpha : faites une sauvegarde de votre carte SD avant installation. Le lecteur de collections n'ecrit jamais dans `BaristaAccountSaveFile.dat`.
          EOF

      - name: Publier ou actualiser la release GitHub
        if: steps.compile.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target="$(git rev-parse HEAD)"
          if gh release view v0.7.0 >/dev/null 2>&1; then
            gh release edit v0.7.0 \
              --title "Switch2 Mode v0.7.0 — Collections Wii U" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload v0.7.0 \
              dist/Switch2Mode_SD.zip \
              build/app/Switch2Mode.wuhb \
              plugin/Switch2ModePlugin.wps \
              --clobber
          else
            gh release create v0.7.0 \
              dist/Switch2Mode_SD.zip \
              build/app/Switch2Mode.wuhb \
              plugin/Switch2ModePlugin.wps \
              --target "$target" \
              --title "Switch2 Mode v0.7.0 — Collections Wii U" \
              --notes-file release-notes.md \
              --prerelease
          fi

      - name: Conserver aussi les fichiers comme artifact
        if: steps.compile.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Switch2Mode-v0.7.0-WiiU
          path: |
            dist/Switch2Mode_SD.zip
            build/app/Switch2Mode.wuhb
            plugin/Switch2ModePlugin.wps

      - name: Enregistrer le statut final sur le commit
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state=failure
          description="La compilation ou la publication a echoue"
          if [[ "$JOB_STATUS" == "success" ]]; then
            state=success
            description="Release v0.7.0 compilee et publiee"
          fi
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="release/v0.7.0" \
            -f description="$description"
