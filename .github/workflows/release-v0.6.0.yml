name: Release Switch2 Mode v0.6.0

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-v0.6.0.yml"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      issues: write
      statuses: write

    steps:
      - name: Recuperer le projet
        uses: actions/checkout@v4

      - name: Verifier les ressources de l'intro
        id: resources
        continue-on-error: true
        run: |
          set -o pipefail
          {
            test -f app/content/intro/intro.ogg
            test "$(find app/content/intro/frames -name 'frame_*.webp' | wc -l)" -eq 276
          } 2>&1 | tee resources.log

      - name: Construire l'image de compilation
        id: docker_build
        if: steps.resources.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          docker build -t switch2mode-builder . 2>&1 | tee docker-build.log

      - name: Compiler le WUHB, le plugin et l'archive SD
        id: compile
        if: steps.docker_build.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          docker run --rm \
            -v "$PWD":/project \
            switch2mode-builder \
            ./scripts/build.sh 2>&1 | tee compile.log
          test -f build/app/Switch2Mode.wuhb
          test -f plugin/Switch2ModePlugin.wps
          test -f dist/Switch2Mode_SD.zip

      - name: Publier un rapport si la compilation echoue
        if: steps.resources.outcome != 'success' || steps.docker_build.outcome != 'success' || steps.compile.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Échec de la release v0.6.0"
            echo
            echo "- Commit : \`$GITHUB_SHA\`"
            echo "- Exécution : \`$GITHUB_RUN_ID\`"
            echo "- Ressources : \`${{ steps.resources.outcome }}\`"
            echo "- Image Docker : \`${{ steps.docker_build.outcome }}\`"
            echo "- Compilation : \`${{ steps.compile.outcome }}\`"
            echo
            for log in resources.log docker-build.log compile.log; do
              if [[ -f "$log" ]]; then
                echo "### $log"
                echo '```text'
                tail -n 180 "$log"
                echo '```'
              fi
            done
          } > failure-report.md

          gh issue create \
            --title "Diagnostic release v0.6.0 — run $GITHUB_RUN_ID" \
            --body-file failure-report.md
          exit 1

      - name: Creer les notes de version
        if: steps.compile.outcome == 'success'
        run: |
          cat > release-notes.md <<'EOF'
          ## Switch2 Mode v0.6.0 — Alpha

          Première version publiable du menu Wii U inspiré de l'interface Switch 2.

          ### Inclus
          - Application graphique Wii U au format `.wuhb`
          - Plugin Aroma au format `.wps`
          - Archive SD prête à copier
          - Intro corrigée en 16:9, 30 FPS, avec 276 images synchronisées et piste audio OGG
          - Navigation horizontale, animations de glissement et lancement des jeux
          - Tiroirs de rangement visuels : `Tous les jeux`, `Favoris` et `Récents`
          - Catégories et raccourcis inspirés des applications système Wii U
          - Compatibilité Wii U GamePad et manette Wii U Pro

          ### Installation recommandée
          1. Télécharger `Switch2Mode_SD.zip`.
          2. Extraire son dossier `wiiu` à la racine de la carte SD.
          3. Démarrer la Wii U avec Aroma.
          4. Lancer `Switch2 Mode` depuis l'Homebrew Launcher.

          > Version alpha : faites une sauvegarde de votre carte SD avant installation. Le projet ne modifie pas la NAND.
          EOF

      - name: Publier ou actualiser la release GitHub
        if: steps.compile.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.6.0 >/dev/null 2>&1; then
            gh release edit v0.6.0 \
              --title "Switch2 Mode v0.6.0 — Alpha" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload v0.6.0 \
              dist/Switch2Mode_SD.zip \
              build/app/Switch2Mode.wuhb \
              plugin/Switch2ModePlugin.wps \
              --clobber
          else
            gh release create v0.6.0 \
              dist/Switch2Mode_SD.zip \
              build/app/Switch2Mode.wuhb \
              plugin/Switch2ModePlugin.wps \
              --target "$GITHUB_SHA" \
              --title "Switch2 Mode v0.6.0 — Alpha" \
              --notes-file release-notes.md \
              --prerelease
          fi

      - name: Conserver aussi les fichiers comme artifact
        if: steps.compile.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Switch2Mode-v0.6.0-WiiU
          path: |
            dist/Switch2Mode_SD.zip
            build/app/Switch2Mode.wuhb
            plugin/Switch2ModePlugin.wps

      - name: Enregistrer le statut final sur le commit
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state=failure
          description="La compilation ou la publication a échoué"
          if [[ "$JOB_STATUS" == "success" ]]; then
            state=success
            description="Release v0.6.0 compilée et publiée"
          fi
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f context="release/v0.6.0" \
            -f description="$description"
